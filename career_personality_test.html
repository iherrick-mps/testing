<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Compass — Personality & Career Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-bg:#ffffff;
  --color-bg-secondary:#f5f4f0;
  --color-text-primary:#1a1a1a;
  --color-text-secondary:#6b6b6b;
  --color-text-tertiary:#9a9a9a;
  --color-border-light:rgba(0,0,0,0.1);
  --color-border-med:rgba(0,0,0,0.18);
  --color-accent:#534AB7;
  --color-accent-dark:#3C3489;
  --color-accent-bg:#EEEDFE;
  --color-accent-text:#26215C;
  --radius-md:8px;
  --radius-lg:12px;
}
body{
  font-family:'Georgia', serif;
  background:#f9f8f4;
  color:var(--color-text-primary);
  min-height:100vh;
  padding:2rem 1rem 4rem;
}
#app{max-width:700px;margin:0 auto}
.header{margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:0.5px solid var(--color-border-light)}
h1{
  font-size:28px;
  font-weight:400;
  font-style:italic;
  color:var(--color-text-primary);
  margin-bottom:6px;
  letter-spacing:-0.02em;
}
.sub{font-size:14px;color:var(--color-text-secondary);font-family:'Georgia',serif;font-style:normal}
.progress-bar{height:3px;background:var(--color-border-light);border-radius:4px;margin-bottom:1.8rem;overflow:hidden}
.progress-fill{height:100%;background:var(--color-accent);border-radius:4px;transition:width 0.4s ease}
.section-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-bottom:10px;font-family:'Georgia',serif;font-style:normal}
.badge-mbti{background:#EEEDFE;color:#3C3489}
.badge-lifestyle{background:#E1F5EE;color:#085041}
.badge-content{background:#FAEEDA;color:#633806}
.q-num{font-size:11px;color:var(--color-text-tertiary);margin-bottom:5px;font-family:'Georgia',serif;letter-spacing:0.08em;font-style:normal}
.q-text{font-size:18px;font-weight:400;color:var(--color-text-primary);margin-bottom:1.4rem;line-height:1.55;font-style:italic}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:1.8rem}
.opt{
  padding:13px 18px;
  border:0.5px solid var(--color-border-light);
  border-radius:var(--radius-md);
  cursor:pointer;
  font-size:14px;
  color:var(--color-text-primary);
  background:#fff;
  transition:border-color 0.15s,background 0.15s;
  text-align:left;
  line-height:1.5;
  font-family:'Georgia',serif;
}
.opt:hover{border-color:var(--color-border-med);background:#fafaf7}
.opt.selected{border-color:var(--color-accent);background:var(--color-accent-bg);color:var(--color-accent-text)}
.nav{display:flex;gap:10px;align-items:center}
.btn{
  padding:10px 22px;
  border-radius:var(--radius-md);
  border:0.5px solid var(--color-border-med);
  background:#fff;
  color:var(--color-text-primary);
  font-size:14px;
  cursor:pointer;
  font-family:'Georgia',serif;
  font-style:italic;
}
.btn:hover{background:var(--color-bg-secondary)}
.btn.primary{background:var(--color-accent);border-color:var(--color-accent);color:#fff;font-style:normal;font-weight:700;letter-spacing:0.02em}
.btn.primary:hover{background:var(--color-accent-dark)}
.btn:disabled{opacity:0.35;cursor:not-allowed}
#results{display:none}
.result-card{
  background:#fff;
  border:0.5px solid var(--color-border-light);
  border-radius:var(--radius-lg);
  padding:1.4rem 1.5rem;
  margin-bottom:12px;
}
.job-rank{font-size:11px;font-weight:700;color:var(--color-text-tertiary);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:4px;font-family:'Georgia',serif}
.job-title{font-size:20px;font-weight:400;font-style:italic;color:var(--color-text-primary);margin-bottom:6px}
.job-field{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:3px 9px;border-radius:10px;display:inline-block;margin-bottom:10px}
.field-eng{background:#E6F1FB;color:#0C447C}
.field-trade{background:#FAEEDA;color:#633806}
.field-cs{background:#EAF3DE;color:#27500A}
.field-elec{background:#EEEDFE;color:#3C3489}
.job-why{font-size:13px;color:var(--color-text-secondary);line-height:1.7;font-family:'Georgia',serif}
.mbti-box{
  background:#fff;
  border:0.5px solid var(--color-border-light);
  border-radius:var(--radius-lg);
  padding:1.2rem 1.5rem;
  margin-bottom:1rem;
  display:flex;
  align-items:center;
  gap:1.5rem;
}
.mbti-type{font-size:42px;font-weight:400;font-style:italic;color:var(--color-accent);letter-spacing:0.06em}
.mbti-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--color-text-tertiary);margin-bottom:2px}
.mbti-name{font-size:16px;font-style:italic;color:var(--color-text-secondary)}
.divider{height:0.5px;background:var(--color-border-light);margin:1.5rem 0}
.score-row{margin-bottom:1.2rem}
.bar-chart{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem}
.bar-row{display:grid;grid-template-columns:110px 1fr 48px;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--color-text-secondary);font-family:'Georgia',serif;font-style:italic;text-align:right}
.bar-track{height:14px;background:var(--color-bg-secondary);border-radius:7px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:7px;transition:width 0.6s ease}
.bar-pct{font-size:12px;color:var(--color-text-tertiary);font-family:'Georgia',serif;font-style:italic;min-width:36px}
.bar-center-line{position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(0,0,0,0.12)}
.job-desc{font-size:13px;color:var(--color-text-secondary);line-height:1.6;font-family:'Georgia',serif;font-style:italic;margin-bottom:8px;border-left:2px solid var(--color-border-light);padding-left:10px}
.q-counter-text{font-size:13px;color:var(--color-text-tertiary);margin-left:auto;font-family:'Georgia',serif;font-style:italic}
.section-intro{font-size:12px;color:var(--color-text-tertiary);font-style:italic;margin-bottom:1rem;padding:8px 12px;border-left:2px solid var(--color-border-light);line-height:1.5}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>career compass</h1>
    <p class="sub">44 questions &middot; discover your personality type + top 10 career paths in engineering, trades, computer science &amp; electronics</p>
  </div>

  <div id="quiz-section">
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:3%"></div></div>
    <div id="q-container"></div>
    <div class="nav">
      <button class="btn" id="back-btn" onclick="goBack()" disabled>&#8592; back</button>
      <button class="btn primary" id="next-btn" onclick="goNext()" disabled>next</button>
      <span class="q-counter-text" id="q-counter">1 / 44</span>
    </div>
  </div>

  <div id="results"></div>
</div>

<script>
const questions=[
{section:"mbti",badge:"badge-mbti",label:"personality",q:"You've got a free Saturday with no plans. What sounds most appealing?",opts:["Recharge at home alone, maybe tinkering on a project","Catch up with a few close friends","Go out and meet new people or join a group event","A mix — some solo time, then hanging out later"],scores:[{E:-2},{E:-1},{E:2},{E:1}]},
{section:"mbti",badge:"badge-mbti",label:"personality",q:"When solving a problem, you tend to:",opts:["Focus on the facts and step-by-step details","Look for patterns and think about the bigger picture","Start with what feels right, then check the logic","Jump between approaches and see what sticks"],scores:[{S:2},{N:2},{F:1,N:1},{P:1}]},
{section:"mbti",badge:"badge-mbti",label:"personality",q:"Which describes how you make decisions?",opts:["I analyze the pros and cons logically","I go with my gut or what feels fair to people","I make a plan and commit to it","I keep options open until I have to decide"],scores:[{T:2},{F:2},{J:2},{P:2}]},
{section:"mbti",badge:"badge-mbti",label:"personality",q:"When starting a new project, you prefer to:",opts:["Have a clear plan with defined steps","Dive in and figure it out along the way","Understand how it fits the bigger picture first","Focus on the practical tools and resources needed"],scores:[{J:2,S:1},{P:2},{N:2},{S:2,J:1}]},
{section:"mbti",badge:"badge-mbti",label:"personality",q:"After a long day working with people, you feel:",opts:["Energized — I love being around people","Drained — I need quiet time to recover","Depends on the people, but usually okay","About the same as when I started"],scores:[{E:2},{I:2},{E:1},{I:1}]},
{section:"lifestyle",badge:"badge-lifestyle",label:"lifestyle",q:"When it comes to salary, how honest are you being with yourself?",opts:["Money is my top priority — I want to earn as much as possible","Money matters a lot, but it's not everything","I want to be comfortable, but I'd take less pay for work I love","I honestly don't care much about money"],scores:[{money:4},{money:3},{money:1},{money:0}]},
{section:"lifestyle",badge:"badge-lifestyle",label:"lifestyle",q:"Some jobs — like defense, oil, or finance — pay very well but may indirectly cause harm. How do you feel about that?",opts:["That doesn't bother me — it's part of how the world works","I could do it if the pay is exceptional","I'd feel uncomfortable and would rather avoid it","No way — I'd rather earn less doing something I believe in"],scores:[{harm_ok:4},{harm_ok:3},{harm_ok:1},{harm_ok:0}]},
{section:"lifestyle",badge:"badge-lifestyle",label:"lifestyle",q:"Making a concrete, positive impact on the world through your work is:",opts:["Essential — it's the whole point","Very important to me","Nice to have, but not a dealbreaker","Honestly not that high on my list"],scores:[{impact:4},{impact:3},{impact:1},{impact:0}]},
{section:"lifestyle",badge:"badge-lifestyle",label:"lifestyle",q:"Imagine two paths: Path A pays $120k but you sit at a desk all day. Path B pays $65k but you're out in the world working with your hands. Which do you lean toward?",opts:["Path A — the money is worth it","Leaning A, but I'd want some variety","Leaning B, even with less pay","Path B — I'd go crazy sitting at a desk"],scores:[{money:3,outdoors:-1},{money:2,outdoors:1},{outdoors:2,money:1},{outdoors:3,money:-1}]},
{section:"lifestyle",badge:"badge-lifestyle",label:"lifestyle",q:"How do you feel about working long or irregular hours?",opts:["Totally fine — I'll work whatever it takes","Okay sometimes, but I want a real life outside work","I prefer stable, predictable hours","Long hours are a dealbreaker for me"],scores:[{hours:4},{hours:2},{hours:1},{hours:0}]},
{section:"lifestyle",badge:"badge-lifestyle",label:"lifestyle",q:"What kind of work environment sounds most like you?",opts:["Outdoors or on a job site, doing physical work","In a workshop or lab — hands-on but controlled","Office-based, focusing on analysis or design","Flexible — some of each works for me"],scores:[{outdoors:4,hands:3},{hands:4,outdoors:1},{hands:0,outdoors:0},{hands:2,outdoors:2}]},
{section:"lifestyle",badge:"badge-lifestyle",label:"lifestyle",q:"Working alone vs. working with a team — what's your honest preference?",opts:["I do my best work completely solo","I prefer mostly solo with occasional collaboration","I like being part of a team but having my own tasks","The more collaboration the better"],scores:[{team:0,I:2},{team:1,I:1},{team:2,E:1},{team:3,E:2}]},
{section:"lifestyle",badge:"badge-lifestyle",label:"lifestyle",q:"Some jobs mean being away from home — on oil rigs, military deployments, or remote construction sites — for weeks or months. How do you feel about that?",opts:["That actually sounds exciting to me","I could handle it if the pay is worth it","I'd do it short-term but not long-term","That's not something I'm willing to do"],scores:[{travel:4,outdoors:2,hours:2},{travel:3,money:1},{travel:1},{travel:0}]},
{section:"lifestyle",badge:"badge-lifestyle",label:"lifestyle",q:"How important is job security and predictability to you?",opts:["Very important — I want stable, consistent work","Somewhat important, but I'd take some risk for more reward","I'm comfortable with uncertainty if the upside is high","I actually prefer environments that change a lot"],scores:[{J:2,risk:-1},{J:1},{P:1,risk:1},{P:2,risk:2}]},
{section:"lifestyle",badge:"badge-lifestyle",label:"lifestyle",q:"What would make you proudest when describing your job to someone?",opts:["The technical skill or precision involved","The positive impact it has on people or the planet","How well it pays or how competitive the field is","The creativity or originality of what I build"],scores:[{T:1,S:1},{impact:2,F:1},{money:1},{creative:2,N:1}]},
{section:"lifestyle",badge:"badge-lifestyle",label:"lifestyle",q:"How much schooling are you realistically willing to do after high school?",opts:["None or minimal — I want to start working as soon as possible","A trade program or certificate (1–2 years)","A bachelor's degree (4 years)","As much as it takes — I'm willing to go to grad school or beyond"],scores:[{school:-4},{school:-2},{school:2},{school:4}]},
{section:"lifestyle",badge:"badge-lifestyle",label:"lifestyle",q:"You're choosing between two jobs you'd be equally good at. Job A requires a master's degree; Job B requires a 6-month trade certification. Which feels more right for you?",opts:["Job A — I enjoy deep academic study and specialized knowledge","Job A — the advanced degree opens more doors and I'm willing to put in the time","Job B — I'd rather get certified and get to work","Job B — hands-on training fits how I learn best"],scores:[{school:4,N:1},{school:2},{school:-2},{school:-3,hands:1,S:1}]},
{section:"lifestyle",badge:"badge-lifestyle",label:"lifestyle",q:"How do you feel about the idea of spending years in a classroom studying theory before you can actually do the job?",opts:["I love it — deep theoretical understanding is what I'm after","It's worth it — I'll get through it to reach the career I want","It would be really hard for me — I prefer learning by doing","I'd never do that — I want to learn on the job, not in school"],scores:[{school:4,N:1},{school:2},{school:-1,hands:1},{school:-3,hands:2,S:1}]},
{section:"content",badge:"badge-content",label:"interest",q:"Which of these sounds most interesting to you?",opts:["Designing and building physical machines or structures","Writing code and building software systems","Installing, maintaining, or repairing equipment in the field","Understanding how and why materials behave the way they do"],scores:[{hands:2,eng:2},{cs:2},{hands:2,trade:2},{S:1,eng:1,mat:1}]},
{section:"content",badge:"badge-content",label:"interest",q:"Imagine you're in a robotics class and the robot isn't working. What role do you naturally take?",opts:["Debug the code — I want to find the logic error","Inspect the physical components — something must be loose or broken","Try both and figure out which layer the problem is in","Suggest a new approach and redesign the system"],scores:[{cs:2,T:1},{hands:2,S:1,trade:1},{T:1,S:1,eng:1},{N:2,creative:1,eng:1}]},
{section:"content",badge:"badge-content",label:"interest",q:"Which field sounds most exciting to you?",opts:["Aerospace — rockets, satellites, aircraft","Skilled trades — welding, woodworking, construction","Software & computers — apps, AI, systems programming","Electronics — circuits, microcontrollers, embedded devices"],scores:[{aero:3,eng:2,risk:2},{trade:3,hands:2,risk:-1},{cs:3,risk:1},{elec:3,hands:1}]},
{section:"content",badge:"badge-content",label:"interest",q:"Which end product would you be most proud to say you helped build?",opts:["A bridge, building, or vehicle that thousands of people use","An app or platform used by millions of people","A custom piece of furniture or metalwork structure you made by hand","An electronic device or circuit board powering something important"],scores:[{eng:2,impact:1,hands:1},{cs:2,impact:1},{trade:2,hands:3,creative:1},{elec:2,hands:1}]},
{section:"content",badge:"badge-content",label:"interest",q:"If you could shadow a professional for a week, who would you choose?",opts:["An aerospace engineer working on rockets or planes","A welder or electrician on a large construction site","A software engineer at a major tech company","A circuit design engineer working on new electronics"],scores:[{aero:3,eng:2,risk:2},{trade:3,hands:3,elec:1},{cs:3},{elec:3,eng:1}]},
{section:"content",badge:"badge-content",label:"interest",q:"Which subject in school sounds most interesting to you, honestly?",opts:["Math and physics — understanding how the universe works","Shop class — building and fixing things with your hands","Computer science — coding, algorithms, and logic","Electronics and circuits — how devices actually work"],scores:[{eng:2,N:1,school:2},{trade:3,hands:3,school:-2},{cs:3,school:1},{elec:3,school:1}]},
{section:"content",badge:"badge-content",label:"interest",q:"You have to pick a college-level subject to study for a year. You pick:",opts:["Structural engineering and physics","Computer science and algorithms","Electrical circuits and signal processing","Wood/metal shop and fabrication techniques"],scores:[{eng:3,S:1,school:2},{cs:3,N:1,school:1},{elec:3,T:1,school:1},{trade:3,hands:2,school:-1}]},
{section:"content",badge:"badge-content",label:"interest",q:"What sounds most exciting about working in the tech or engineering world?",opts:["Pushing what's physically possible — extreme engineering","The cutting edge — AI, crypto, drone swarms, laser weapons","The craft and mastery — becoming truly excellent at a skilled trade","The logic and elegance — writing clean, efficient code"],scores:[{eng:2,aero:1,risk:2},{cs:2,risk:4,N:2},{trade:3,S:2,hands:2,risk:-2},{cs:2,T:2}]},
{section:"content",badge:"badge-content",label:"interest",q:"How do you feel about working with dangerous materials or in physically risky environments — heights, high voltage, heavy machinery?",opts:["Doesn't bother me — it's part of the job","A little nervous but I'd adapt","I'd prefer to stay away from physical risk","That kind of environment actually appeals to me"],scores:[{harm_ok:2,outdoors:1,risk:1},{outdoors:1},{outdoors:-1,risk:-2},{outdoors:3,harm_ok:3,risk:3}]},
{section:"content",badge:"badge-content",label:"interest",q:"When you imagine your ideal workday, which sounds more satisfying?",opts:["Solving a problem nobody has solved before — inventing something new","Executing a well-defined task with skill and precision","A mix — mostly proven methods, but with room to improve","Following established steps to get a reliable, repeatable result"],scores:[{creative:4,N:2,risk:1},{creative:0,S:2},{creative:2},{creative:-1,S:2,J:1,risk:-1}]},
{section:"content",badge:"badge-content",label:"interest",q:"Which type of problem do you find most satisfying to solve?",opts:["An optimization problem — make the system faster, cheaper, or more efficient","A human problem — help people communicate, connect, or thrive","A physical problem — fix or build something tangible","A design problem — make something both beautiful and functional"],scores:[{T:2,S:1,eng:1},{F:1,impact:1,cs:1},{hands:2,trade:2},{creative:2,N:1,eng:1}]},
{section:"content",badge:"badge-content",label:"interest",q:"The idea of working outdoors — on job sites, oil fields, or in the elements — sounds:",opts:["Awesome — I'd love being out of an office","Okay, as long as I'm doing meaningful work","Tolerable if necessary","Like something I'd actively try to avoid"],scores:[{outdoors:4,risk:1},{outdoors:2},{outdoors:1},{outdoors:-1,risk:-1}]},
{section:"content",badge:"badge-content",label:"interest",q:"Low-level, embedded, or systems programming — writing code close to hardware like operating systems or firmware — sounds:",opts:["Fascinating — I love the idea of being close to the metal","Interesting, but I'd rather do higher-level apps or web","Confusing to me — I'd rather work with physical hardware","Not really my thing at all"],scores:[{embedded:3,elec:1,cs:2,T:1},{cs:2},{hands:2,trade:1,elec:1},{elec:-1}]},
{section:"content",badge:"badge-content",label:"interest",q:"Which best describes the type of legacy you'd want your work to leave?",opts:["I built something that lasted — a structure, a machine, a system","I helped make the world cleaner, safer, or more just","I made something people love using every day","I mastered a craft and passed it on"],scores:[{eng:2,S:1,J:1},{impact:3,F:1},{creative:2,cs:1},{trade:2,S:1,school:-1}]},
{section:"content",badge:"badge-content",label:"interest",q:"Which statement describes you best?",opts:["I'm most energized when I'm building or fixing physical things","I like the idea of designing systems and solving abstract problems","I want to understand how something works at the deepest level possible","I care most about who my work helps — people or planet"],scores:[{hands:3,trade:2,S:2},{T:2,N:1,eng:1},{T:2,N:2,cs:1,school:2},{impact:3,F:2}]},
{section:"content",badge:"badge-content",label:"interest",q:"How important is it to you that your job involves coming up with genuinely new ideas — designs, methods, or solutions that haven't been done before?",opts:["Essential — I want to invent and create, not just execute","Pretty important — I want real creative input, even if not every day","Somewhat — I like occasional novelty but don't need it constantly","Not important — I'd rather master a proven craft than reinvent things"],scores:[{creative:4,N:2,risk:1},{creative:3,N:1},{creative:1},{creative:-1,S:2,risk:-1}]},
{section:"content",badge:"badge-content",label:"interest",q:"How important is it to you that strangers find your job impressive or exciting?",opts:["Very important — I want people to think my job is cool","Somewhat — it'd be nice but it's not a requirement","Not really — I care more about what the work actually is","Totally unimportant — I don't care what anyone thinks"],scores:[{cool:4},{cool:2},{cool:1},{cool:0}]},
{section:"content",badge:"badge-content",label:"interest",q:"If you had to introduce your job to someone you just met, which would YOU want to say?",opts:["I work on laser weapons systems for the military","I'm a plumber — best job security in the world","I'm a software engineer at a tech company","I do building inspections and code compliance"],scores:[{cool:4,harm_ok:2,risk:3},{cool:0,risk:-2},{cool:2,risk:1},{cool:1,risk:-1}]},
{section:"content",badge:"badge-content",label:"interest",q:"How do you feel about a career field that changes so fast you'd need to keep learning new things every year just to stay relevant?",opts:["That's exciting — I love being on the frontier of what's new","That's fine — I enjoy learning as fields evolve","That sounds exhausting — I'd rather master one thing deeply","That's a dealbreaker — I want skills that stay valuable for decades"],scores:[{risk:4,N:2,P:1},{risk:2},{risk:0,S:1},{risk:-3,S:2,J:2}]},
{section:"content",badge:"badge-content",label:"interest",q:"Which scenario sounds most like you at your best?",opts:["Reverse-engineering a piece of military hardware no one has cracked before","Perfectly rebuilding a classic car engine from scratch","Optimizing a machine learning model to set a new benchmark","Designing a building that becomes a city landmark"],scores:[{risk:4,cs:1,harm_ok:2,eng:1},{trade:3,hands:4,S:2,risk:-1},{cs:3,risk:3,N:2},{eng:2,creative:4,risk:0}]},
{section:"content",badge:"badge-content",label:"interest",q:"Realistically, how much do you enjoy sitting down and reading a textbook or studying complex theory?",opts:["I genuinely love it — deep theoretical knowledge is what I'm after","I can handle it — I'll do the studying to reach the career I want","It's not my favorite, but I can push through","I strongly dislike it — I learn by doing, not by reading"],scores:[{school:4,N:2,T:1},{school:2},{school:-1},{school:-3,S:2,hands:1}]},
{section:"content",badge:"badge-content",label:"interest",q:"If money weren't a factor, which path would you genuinely choose?",opts:["A PhD in a cutting-edge research field like quantum computing or materials science","A four-year engineering degree followed by a real-world industry job","A two-year trade program that gets you working fast and earning quickly","Self-taught and freelance — no formal credentials at all"],scores:[{school:5,N:3,risk:2,cs:1,eng:1},{school:2,eng:2},{school:-2,trade:2,hands:2},{school:-3,creative:2,P:2}]},

let current=0;
let answers=new Array(44).fill(null);

function render(){
  const q=questions[current];
  const pct=Math.round(((current+1)/44)*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('q-counter').textContent=(current+1)+' / 44';
  const html=`
    <span class="section-badge ${q.badge}">${q.label}</span>
    <div class="q-num">question ${current+1}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">
      ${q.opts.map((o,i)=>`<button class="opt${answers[current]===i?' selected':''}" onclick="pick(${i})">${o}</button>`).join('')}
    </div>
  `;
  document.getElementById('q-container').innerHTML=html;
  document.getElementById('back-btn').disabled=current===0;
  document.getElementById('next-btn').disabled=answers[current]===null;
  document.getElementById('next-btn').textContent=current===43?'see my results \u2192':'next \u2192';
}

function pick(i){
  answers[current]=i;
  render();
}

function goNext(){
  if(answers[current]===null)return;
  if(current===43){showResults();return;}
  current++;
  render();
}

function goBack(){
  if(current===0)return;
  current--;
  render();
}

function calcScores(){
  const s={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0,money:0,impact:0,harm_ok:0,outdoors:0,hours:0,hands:0,team:0,creative:0,cool:0,risk:0,school:0,eng:0,cs:0,trade:0,elec:0,aero:0,mat:0,embedded:0,travel:0};
  questions.forEach((q,qi)=>{
    const chosen=answers[qi];
    if(chosen===null)return;
    const sc=q.scores[chosen];
    Object.keys(sc).forEach(k=>{s[k]=(s[k]||0)+sc[k];});
  });
  return s;
}

function getMBTI(s){
  return (s.E>=s.I?'E':'I')+(s.S>=s.N?'S':'N')+(s.T>=s.F?'T':'F')+(s.J>=s.P?'J':'P');
}

function scoreJob(job,s,mbti){
  let score=0;

  function norm(val){ return Math.min((val||0)/4, 5); }
  // school can go negative (trade school), so we center it differently
  function normSchool(val){ return Math.max(-5, Math.min(5, (val||0)/4)); }

  const softDims=[
    {d:'money',   w:1.0},
    {d:'impact',  w:2.0},
    {d:'creative',w:2.0},
    {d:'team',    w:1.0},
    {d:'cool',    w:1.0},
  ];
  softDims.forEach(({d,w})=>{
    const uv=norm(s[d]);
    const diff=Math.abs(uv-job[d]);
    score+=Math.max(-2*w, (4-diff*1.2)*w);
  });

  const hardDims=[
    {d:'outdoors', weight:3.0},
    {d:'hands',    weight:3.0},
    {d:'hours',    weight:1.5},
    {d:'harm_ok',  weight:2.0},
    {d:'risk',     weight:3.0},
  ];
  hardDims.forEach(({d,weight})=>{
    const uv=norm(s[d]);
    const diff=uv-job[d];
    score+=Math.max(-6, (4-Math.abs(diff)*weight));
  });

  // School: signed dimension — negative = trade/no degree, positive = advanced degree
  // User's school score can be negative (wants no school) to positive (wants academia)
  // Job's school value: -5 to 5
  {
    const uv=normSchool(s.school);
    const jv=job.school||0;
    const diff=Math.abs(uv-jv);
    score+=Math.max(-12, (4-diff*0.8)*3.0);
  }

  const mbtiDims=['I','E','S','N','T','F','J','P'];
  mbtiDims.forEach(d=>{
    if(mbti.includes(d)) score+=(job[d]||0)*0.6;
  });

  const tagBoosts={eng:s.eng,cs:s.cs,trade:s.trade,elec:s.elec,aero:s.aero,embedded:s.embedded};
  job.tags.forEach(t=>{if(tagBoosts[t])score+=tagBoosts[t]*0.25;});

  return score;
}

function maxPossibleScore(){
  const softMax=(1+2+2+1+1)*4;
  const hardMax=(3+3+1.5+2+3)*4;
  const schoolMax=4*3.0;
  return softMax+hardMax+schoolMax;
}

function whyJob(job,s,mbti){
  const reasons=[];
  if(s.money>=10&&job.money>=4)reasons.push("strong earning potential aligns with your priority on pay");
  if(s.impact>=8&&job.impact>=3)reasons.push("meaningful positive impact matches what you said matters to you");
  if(s.harm_ok<=2&&job.harm_ok<=1)reasons.push("low ethical concerns match your values");
  if(s.harm_ok>=8&&job.harm_ok>=3)reasons.push("you indicated comfort with ethically complex work, which this field involves");
  if(s.outdoors>=8&&job.outdoors>=3)reasons.push("physical and outdoor work matches your preference");
  if(s.outdoors<=2&&job.outdoors<=1)reasons.push("minimal outdoor/field requirements suit your preference for controlled environments");
  if(s.hours>=8&&job.hours>=3)reasons.push("you're comfortable with demanding hours, which is common in this role");
  if(s.hands>=8&&job.hands>=3)reasons.push("strong hands-on, physical component matches your working style");
  if(s.hands<=2&&job.hands<=1)reasons.push("abstract, non-physical work suits your style");
  if(s.creative>=8&&job.creative>=4)reasons.push("high need for novelty and original thinking matches this role's creative demands");
  if(s.creative<=2&&job.creative<=1)reasons.push("you prefer executing proven methods over inventing new ones — this role rewards exactly that");
  if(s.cool>=6&&job.cool>=4)reasons.push("this is a job that genuinely impresses people — matches your preference for work others find cool");
  if(s.cool<=1&&job.cool<=1)reasons.push("this role doesn't rely on impressiveness to attract people — suits your indifference to status");
  if(s.risk>=8&&job.risk>=3)reasons.push("you want cutting-edge, high-stakes work — this field delivers exactly that");
  if(s.risk<=-4&&job.risk<=-2)reasons.push("you want a stable, proven field — this role has decades of established practice behind it");
  if(s.school>=8&&(job.school||0)>=3)reasons.push("you're open to advanced study — this field rewards deep academic specialization");
  if(s.school<=-6&&(job.school||0)<=-2)reasons.push("you want to get to work fast without years of school — this role can be entered through trade training");
  if(s.team<=2&&job.team<=1)reasons.push("largely independent work suits your preference for solo work");
  if(mbti.includes('N')&&job.N>=2)reasons.push("MBTI intuitive type aligns well with the big-picture, systems thinking this role requires");
  if(mbti.includes('S')&&job.S>=2)reasons.push("MBTI sensing type aligns with this role's focus on practical, concrete details");
  if(mbti.includes('T')&&job.T>=2)reasons.push("MBTI thinking type suits this technically rigorous field");
  if(mbti.includes('I')&&job.I>=1)reasons.push("introverted MBTI type fits the independent, focused work style this role rewards");
  if(mbti.includes('E')&&job.E>=1)reasons.push("extroverted MBTI type fits the client-facing and team-heavy nature of this role");
  if(s.eng>=4&&job.tags.includes('eng'))reasons.push("your interest in engineering content lines up with this field");
  if(s.cs>=4&&job.tags.includes('cs'))reasons.push("your interest in computers and coding points here");
  if(s.trade>=4&&job.tags.includes('trade'))reasons.push("your hands-on, trades-oriented interest is a strong fit");
  if(s.elec>=4&&job.tags.includes('elec'))reasons.push("your interest in electronics and circuits matches this role");
  if(s.aero>=4&&job.tags.includes('aero'))reasons.push("you showed strong interest in aerospace");
  if(s.embedded>=4&&job.tags.includes('embedded'))reasons.push("you expressed interest in low-level / embedded programming");
  if(reasons.length===0)reasons.push("overall profile similarity across lifestyle and interest dimensions");
  return reasons.slice(0,3).join("; ")+"."
}

function barChart(s){
  // school can go negative, so we display it centered at 0
  function norm(val,max){return Math.max(0,Math.min(100,Math.round((val||0)/max*100)));}
  function normSigned(val,range){
    // returns 0–100 where 50 = neutral, 100 = max positive, 0 = max negative
    return Math.max(0,Math.min(100,Math.round(((val||0)+range)/(range*2)*100)));
  }
  const dims=[
    {key:'outdoors', label:'outdoor work',  color:'#1D9E75', signed:false, max:24, desc:'office ← → outside & physical'},
    {key:'hands',    label:'hands-on',       color:'#3C3489', signed:false, max:24, desc:'screen-only ← → never use a screen'},
    {key:'school',   label:'schooling',      color:'#185FA5', signed:true,  range:20, desc:'trade school ← → PhD+'},
    {key:'risk',     label:'risk / edge',    color:'#993356', signed:true,  range:20, desc:'stable & safe ← → dangerous & cutting-edge'},
    {key:'creative', label:'creativity',     color:'#D85A30', signed:false, max:24, desc:'procedure ← → invention'},
    {key:'impact',   label:'impact',         color:'#0F6E56', signed:false, max:24, desc:'neutral ← → change the world'},
    {key:'money',    label:'status / money', color:'#BA7517', signed:false, max:16, desc:'not important ← → very important'},
  ];
  return `<div class="bar-chart">`+dims.map(d=>{
    const pct=d.signed ? normSigned(s[d.key],d.range) : norm(s[d.key],d.max);
    const fillColor=d.color;
    return `<div>
      <div class="bar-row">
        <span class="bar-label">${d.label}</span>
        <div class="bar-track" style="position:relative">
          ${d.signed?'<div style="position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(0,0,0,0.15)"></div>':''}
          <div class="bar-fill" style="width:${pct}%;background:${fillColor}"></div>
        </div>
        <span class="bar-pct">${pct}%</span>
      </div>
      <div style="font-size:10px;color:#aaa;font-style:italic;text-align:center;margin-top:1px;padding-left:120px">${d.desc}</div>
    </div>`;
  }).join('')+`</div>`;
}

function showResults(){
  const s=calcScores();
  const mbti=getMBTI(s);
  const maxScore=maxPossibleScore();
  const ranked=JOBS.map(j=>({...j,score:scoreJob(j,s,mbti)})).sort((a,b)=>b.score-a.score);
  const top10=ranked.slice(0,10);
  // Normalize % match relative to the best score so #1 is always 100%
  const best=top10[0].score;
  document.getElementById('quiz-section').style.display='none';
  const res=document.getElementById('results');
  res.style.display='block';
  res.innerHTML=`
    <h1>your results</h1>
    <p class="sub" style="margin-bottom:1.5rem">here's what your answers suggest — use these as starting points to explore, not final answers</p>
    <div class="mbti-box">
      <div class="mbti-type">${mbti}</div>
      <div>
        <div class="mbti-label">your personality type</div>
        <div class="mbti-name">${MBTI_NAMES[mbti]||''}</div>
      </div>
    </div>
    <p style="font-size:12px;font-style:italic;color:var(--color-text-tertiary);margin-bottom:0.8rem">what matters to you</p>
    ${barChart(s)}
    <div class="divider"></div>
    <p style="font-size:13px;font-weight:400;color:var(--color-text-secondary);margin-bottom:1rem;font-style:italic">your top 10 career matches</p>
    ${top10.map((j,i)=>{
      const pct=Math.round((j.score/best)*100);
      const rankLabel=i===0?'#1 — best match':`#${i+1}`;
      return `
      <div class="result-card">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px">
          <div class="job-rank">${rankLabel}</div>
          <div style="font-size:13px;font-weight:500;color:#534AB7;font-family:Georgia,serif">${pct}% match</div>
        </div>
        <div class="job-title">${j.title}</div>
        <span class="job-field ${j.fclass}">${j.field}</span>
        <div style="height:4px;background:#f0eefc;border-radius:2px;margin:6px 0 10px;overflow:hidden"><div style="height:100%;width:${pct}%;background:#534AB7;border-radius:2px"></div></div>
        <div class="job-desc">${j.desc}</div>
        <div class="job-why">Why this fits you: ${whyJob(j,s,mbti)}</div>
      </div>`;
    }).join('')}
    <div class="divider"></div>
    <button class="btn" onclick="restart()">&#8592; start over</button>
  `;
  window.scrollTo({top:0,behavior:'smooth'});
}

function restart(){
  current=0;
  answers=new Array(44).fill(null);
  document.getElementById('quiz-section').style.display='block';
  document.getElementById('results').style.display='none';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>

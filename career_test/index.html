<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Compass — Personality & Career Test</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <div class="header">
    <h1>career compass</h1>
    <!-- Subtitle is populated by JS once data loads so job count is always accurate -->
    <p class="sub" id="header-sub">loading…</p>
  </div>

  <!-- Loading state -->
  <div id="loading" style="padding:2rem 0;color:var(--color-text-tertiary);font-style:italic;font-size:14px">
    loading data…
  </div>

  <!-- Quiz -->
  <div id="quiz-section" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div id="q-container"></div>
    <div class="nav">
      <button class="btn" id="back-btn" onclick="goBack()" disabled>&#8592; back</button>
      <button class="btn primary" id="next-btn" onclick="goNext()" disabled>next &#8594;</button>
      <span class="q-counter-text" id="q-counter">1 / ?</span>
    </div>
  </div>

  <!-- Results -->
  <div id="results"></div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  DATA — loaded from JSON files at startup
// ─────────────────────────────────────────────────────────────────────────────
let QUESTIONS = [];
let JOBS      = [];
let FIELDS    = {};   // keyed by field.key for fast lookup

// ─────────────────────────────────────────────────────────────────────────────
//  QUIZ STATE
// ─────────────────────────────────────────────────────────────────────────────
let current = 0;
let answers = [];

// ─────────────────────────────────────────────────────────────────────────────
//  MBTI TYPE NAMES
// ─────────────────────────────────────────────────────────────────────────────
const MBTI_NAMES = {
  INTJ:"The Architect",  INTP:"The Logician",   ENTJ:"The Commander", ENTP:"The Debater",
  INFJ:"The Advocate",   INFP:"The Mediator",   ENFJ:"The Protagonist",ENFP:"The Campaigner",
  ISTJ:"The Inspector",  ISFJ:"The Protector",  ESTJ:"The Executive", ESFJ:"The Consul",
  ISTP:"The Virtuoso",   ISFP:"The Adventurer", ESTP:"The Entrepreneur",ESFP:"The Entertainer"
};

// ─────────────────────────────────────────────────────────────────────────────
//  STARTUP — fetch all data files in parallel
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const [qData, cData, fData] = await Promise.all([
      fetch('questions.json').then(r => r.json()),
      fetch('careers.json').then(r => r.json()),
      fetch('fields.json').then(r => r.json()),
    ]);

    QUESTIONS = qData;
    JOBS      = cData;
    fData.forEach(f => { FIELDS[f.key] = f; });

    answers = new Array(QUESTIONS.length).fill(null);

    // Update header subtitle with live counts
    document.getElementById('header-sub').textContent =
      `${QUESTIONS.length} questions · ${JOBS.length} possible career matches · discover your personality type + top 10 paths`;

    document.getElementById('loading').style.display     = 'none';
    document.getElementById('quiz-section').style.display = 'block';

    render();
  } catch (err) {
    document.getElementById('loading').textContent =
      `Failed to load data: ${err.message}. Make sure all JSON files are in the same folder as index.html.`;
    console.error(err);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  RENDER — draw the current question
// ─────────────────────────────────────────────────────────────────────────────
function render() {
  const q   = QUESTIONS[current];
  const pct = Math.round(((current + 1) / QUESTIONS.length) * 100);

  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `${current + 1} / ${QUESTIONS.length}`;

  document.getElementById('q-container').innerHTML = `
    <span class="section-badge ${q.badge}">${q.label}</span>
    <div class="q-num">question ${current + 1}</div>
    <div class="q-text">${q.question}</div>
    <div class="options">
      ${q.responses.map((r, i) => `
        <button class="opt${answers[current] === i ? ' selected' : ''}" onclick="pick(${i})">
          ${r.text}
        </button>`).join('')}
    </div>
  `;

  document.getElementById('back-btn').disabled = current === 0;
  document.getElementById('next-btn').disabled = answers[current] === null;
  document.getElementById('next-btn').textContent =
    current === QUESTIONS.length - 1 ? 'see my results →' : 'next →';
}

function pick(i) {
  answers[current] = i;
  render();
}

function goNext() {
  if (answers[current] === null) return;
  if (current === QUESTIONS.length - 1) { showResults(); return; }
  current++;
  render();
}

function goBack() {
  if (current === 0) return;
  current--;
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
//  SCORING — accumulate dimension scores from all answered questions
// ─────────────────────────────────────────────────────────────────────────────
function calcScores() {
  // Zero-initialise every known field key
  const s = {};
  Object.keys(FIELDS).forEach(k => { s[k] = 0; });
  // Also add any keys that might appear in question weights but not in fields.json
  QUESTIONS.forEach(q => {
    q.responses.forEach(r => {
      Object.keys(r.weights).forEach(k => { if (!(k in s)) s[k] = 0; });
    });
  });

  QUESTIONS.forEach((q, qi) => {
    const chosen = answers[qi];
    if (chosen === null) return;
    const weights = q.responses[chosen].weights;
    Object.entries(weights).forEach(([k, v]) => { s[k] = (s[k] || 0) + v; });
  });
  return s;
}

function getMBTI(s) {
  return (s.E >= s.I ? 'E' : 'I') +
         (s.S >= s.N ? 'S' : 'N') +
         (s.T >= s.F ? 'T' : 'F') +
         (s.J >= s.P ? 'J' : 'P');
}

// ─────────────────────────────────────────────────────────────────────────────
//  JOB SCORING — compute match score for a single job
//
//  Scoring architecture (driven by fields.json):
//    hard  dims  — large penalties for mismatch (lifestyle dealbreakers)
//    soft  dims  — smaller penalties, scaled by weight
//    mbti  dims  — bonus points for matching MBTI letter
//    tag   dims  — small interest-tag boost
//    school      — signed hard dim, handled separately because it can go negative
// ─────────────────────────────────────────────────────────────────────────────
function scoreJob(job, s, mbti) {
  let score = 0;

  function norm(val)       { return Math.min((val || 0) / 4, 5); }
  function normSchool(val) { return Math.max(-5, Math.min(5, (val || 0) / 4)); }

  // Soft dims
  const softKeys = Object.values(FIELDS).filter(f => f.type === 'soft');
  softKeys.forEach(f => {
    const uv   = norm(s[f.key]);
    const diff = Math.abs(uv - (job[f.key] || 0));
    score += Math.max(-2 * f.weight, (4 - diff * 1.2) * f.weight);
  });

  // Hard dims (excluding school, which is signed)
  const hardKeys = Object.values(FIELDS).filter(f => f.type === 'hard' && f.key !== 'school');
  hardKeys.forEach(f => {
    const uv   = norm(s[f.key]);
    const diff = uv - (job[f.key] || 0);
    score += Math.max(-6, (4 - Math.abs(diff) * f.weight));
  });

  // School — signed hard dim
  {
    const uv   = normSchool(s.school);
    const jv   = job.school || 0;
    const diff = Math.abs(uv - jv);
    const w    = (FIELDS.school || { weight: 3.0 }).weight;
    score += Math.max(-12, (4 - diff * 0.8) * w);
  }

  // MBTI bonus
  const mbtiKeys = Object.values(FIELDS).filter(f => f.type === 'mbti');
  mbtiKeys.forEach(f => {
    if (mbti.includes(f.key)) score += (job[f.key] || 0) * f.weight;
  });

  // Interest tag boosts — capped so a single dominant tag can't flood results with one field
  const tagKeys = Object.values(FIELDS).filter(f => f.type === 'tag' && f.weight > 0);
  let tagBoostTotal = 0;
  tagKeys.forEach(f => {
    if ((job.tags || []).includes(f.key)) {
      tagBoostTotal += Math.min((s[f.key] || 0) * f.weight, 4);
    }
  });
  score += Math.min(tagBoostTotal, 8); // total tag contribution capped at 8 pts

  return score;
}

// ─────────────────────────────────────────────────────────────────────────────
//  WHY THIS JOB — generates 1–3 plain-English reasons for a match
// ─────────────────────────────────────────────────────────────────────────────
function whyJob(job, s, mbti) {
  const reasons = [];
  if (s.money   >= 10 && job.money   >= 4) reasons.push("strong earning potential aligns with your priority on pay");
  if (s.impact  >= 8  && job.impact  >= 3) reasons.push("meaningful positive impact matches what you said matters to you");
  if (s.harm_ok <= 2  && job.harm_ok <= 1) reasons.push("low ethical concerns match your values");
  if (s.harm_ok >= 8  && job.harm_ok >= 3) reasons.push("you indicated comfort with ethically complex work, which this field involves");
  if (s.outdoors >= 8 && job.outdoors >= 3) reasons.push("physical and outdoor work matches your preference");
  if (s.outdoors <= 2 && job.outdoors <= 1) reasons.push("minimal outdoor/field requirements suit your preference for controlled environments");
  if (s.hours   >= 8  && job.hours   >= 3) reasons.push("you're comfortable with demanding hours, which is common in this role");
  if (s.hands   >= 8  && job.hands   >= 3) reasons.push("strong hands-on, physical component matches your working style");
  if (s.hands   <= 2  && job.hands   <= 1) reasons.push("abstract, non-physical work suits your style");
  if (s.creative >= 8 && job.creative >= 4) reasons.push("high need for novelty and original thinking matches this role's creative demands");
  if (s.creative <= 2 && job.creative <= 1) reasons.push("you prefer executing proven methods — this role rewards exactly that");
  if (s.cool    >= 6  && job.cool    >= 4) reasons.push("this is a job that genuinely impresses people — matches your preference for cool work");
  if (s.risk    >= 8  && job.risk    >= 3) reasons.push("you want cutting-edge, high-stakes work — this field delivers exactly that");
  if (s.risk    <= -4 && job.risk    <= -2) reasons.push("you want a stable, proven field — this role has decades of established practice");
  if (s.school  >= 8  && (job.school || 0) >= 3) reasons.push("you're open to advanced study — this field rewards deep academic specialization");
  if (s.school  <= -6 && (job.school || 0) <= -2) reasons.push("you want to get to work fast without years of school — this role fits that path");
  if (s.team    <= 2  && job.team    <= 1) reasons.push("largely independent work suits your preference for solo work");
  if (mbti.includes('N') && job.N >= 2) reasons.push("your MBTI intuitive type aligns with the big-picture thinking this role requires");
  if (mbti.includes('S') && job.S >= 2) reasons.push("your MBTI sensing type aligns with this role's focus on practical, concrete details");
  if (mbti.includes('T') && job.T >= 2) reasons.push("your MBTI thinking type suits this technically rigorous field");
  if (mbti.includes('I') && job.I >= 1) reasons.push("your introverted MBTI type fits the independent, focused work style this role rewards");
  if (mbti.includes('E') && job.E >= 1) reasons.push("your extroverted MBTI type fits the team-heavy, client-facing nature of this role");
  if (s.eng  >= 4 && (job.tags || []).includes('eng'))      reasons.push("your interest in engineering content lines up with this field");
  if (s.cs   >= 4 && (job.tags || []).includes('cs'))       reasons.push("your interest in computers and coding points here");
  if (s.trade >= 4 && (job.tags || []).includes('trade'))   reasons.push("your hands-on, trades-oriented interest is a strong fit");
  if (s.elec >= 4 && (job.tags || []).includes('elec'))     reasons.push("your interest in electronics and circuits matches this role");
  if (s.aero >= 4 && (job.tags || []).includes('aero'))     reasons.push("you showed strong interest in aerospace");
  if (s.embedded >= 4 && (job.tags || []).includes('embedded')) reasons.push("you expressed interest in low-level / embedded programming");
  if (reasons.length === 0) reasons.push("overall profile similarity across lifestyle and interest dimensions");
  return reasons.slice(0, 3).join("; ") + ".";
}

// ─────────────────────────────────────────────────────────────────────────────
//  BAR CHART — render the student's profile as horizontal bars
//
//  Which bars to show and how is driven by fields.json (bar_label, color, etc.)
//  Only fields with a bar_label are shown. Signed fields get a centre-line.
// ─────────────────────────────────────────────────────────────────────────────
function barChart(s) {
  // Ordered list of field keys to display in the chart
  const BAR_ORDER = ['outdoors','hands','school','risk','creative','impact','money'];

  function normUnsigned(val, max)  { return Math.max(0, Math.min(100, Math.round((val || 0) / max * 100))); }
  function normSigned(val, range)  { return Math.max(0, Math.min(100, Math.round(((val || 0) + range) / (range * 2) * 100))); }

  // Endpoint labels for each bar: [left meaning, right meaning]
  const ENDPOINT_LABELS = {
    outdoors: ['indoors / office', 'outdoors / field'],
    hands:    ['abstract / desk work', 'physical / hands-on'],
    school:   ['skip school, start now', 'long academic path'],
    risk:     ['stable & proven', 'cutting-edge & high-stakes'],
    creative: ['execute proven methods', 'invent & create'],
    impact:   ['not a priority', 'making a difference'],
    money:    ['not a priority', 'maximize earnings'],
  };

  const rows = BAR_ORDER.map(key => {
    const f = FIELDS[key];
    if (!f || !f.bar_label) return '';
    const pct = f.signed
      ? normSigned(s[key], f.bar_range || 20)
      : normUnsigned(s[key], f.bar_max || 20);
    const midline = f.signed
      ? `<div style="position:absolute;left:50%;top:0;width:100%;height:100%;pointer-events:none">
           <div style="position:absolute;left:50%;top:0;width:1px;height:100%;background:rgba(0,0,0,0.15)"></div>
         </div>`
      : '';
    const [leftLabel, rightLabel] = ENDPOINT_LABELS[key] || ['', ''];
    return `
      <div style="margin-bottom:1.1rem">
        <div style="font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:4px">
          ${f.bar_label}
        </div>
        <div class="bar-track" style="position:relative">
          ${midline}
          <div class="bar-fill" style="width:${pct}%;background:${f.color}"></div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-top:3px">
          <span style="font-size:10px;color:#aaa;font-style:italic;max-width:38%;line-height:1.3">${leftLabel}</span>
          <span style="font-size:11px;font-weight:600;color:${f.color}">${pct}%</span>
          <span style="font-size:10px;color:#aaa;font-style:italic;max-width:38%;text-align:right;line-height:1.3">${rightLabel}</span>
        </div>
      </div>`;
  }).join('');

  return `<div class="bar-chart">${rows}</div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
//  RESULTS STATE — kept in module scope so sendResults() can read it
// ─────────────────────────────────────────────────────────────────────────────
let _lastS         = null;
let _lastMbti      = null;
let _lastRanked    = null;
let _lastGlobalBest = null;

// ─────────────────────────────────────────────────────────────────────────────
//  RESULTS PAGE
// ─────────────────────────────────────────────────────────────────────────────
function showResults() {
  const s      = calcScores();
  const mbti   = getMBTI(s);
  const ranked = JOBS
    .map(j => ({ ...j, score: scoreJob(j, s, mbti) }))
    .sort((a, b) => b.score - a.score);

  // Global best score — used as the denominator for ALL % match values
  const globalBest = ranked[0].score;

  // Store for sendResults()
  _lastS          = s;
  _lastMbti       = mbti;
  _lastRanked     = ranked;
  _lastGlobalBest = globalBest;

  // Group jobs by field, keeping each field sorted by score desc
  const byField = {};
  ranked.forEach(j => {
    const key = j.field || 'Other';
    if (!byField[key]) byField[key] = { fclass: j.fclass, jobs: [] };
    byField[key].jobs.push(j);
  });

  // Sort fields by their top job's score (highest-match field first)
  const sortedFields = Object.entries(byField)
    .sort((a, b) => b[1].jobs[0].score - a[1].jobs[0].score);

  document.getElementById('quiz-section').style.display = 'none';
  const res = document.getElementById('results');
  res.style.display = 'block';

  res.innerHTML = `
    <h1>your results</h1>
    <p class="sub" style="margin-bottom:1.2rem">
      here's what your answers suggest — use these as starting points to explore, not final answers
    </p>

    <!-- Share buttons -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:1rem">
      <button onclick="exportImage('download')" style="flex:1;min-width:160px;padding:12px 18px;background:#534AB7;color:#fff;border:none;border-radius:10px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
        ⬇ download results
      </button>
      <button onclick="exportImage('copy')" style="flex:1;min-width:160px;padding:12px 18px;background:#f0eefc;color:#534AB7;border:1px solid #c9c3f5;border-radius:10px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
        📋 copy results
      </button>
    </div>

    <!-- Email capture (hidden — remove display:none to enable) -->
    <div id="email-card" style="display:none;background:#f7f6ff;border:1px solid #e0dcfb;border-radius:12px;padding:1.2rem 1.4rem;margin-bottom:1rem">
      <div style="font-size:15px;font-weight:600;color:#2d2b55;margin-bottom:4px">📬 get your results in your inbox</div>
      <div style="font-size:13px;color:var(--color-text-secondary);margin-bottom:1rem">
        We'll email you your personality type, profile chart, and top career matches so you can revisit them later.
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input id="email-input" type="email" placeholder="your@email.com"
          style="flex:1;min-width:180px;padding:8px 12px;border:1px solid #ccc;border-radius:8px;font-size:14px;font-family:inherit;outline:none"
          onkeydown="if(event.key==='Enter') sendResults()" />
        <button onclick="sendResults()"
          style="padding:8px 18px;background:#534AB7;color:#fff;border:none;border-radius:8px;font-size:14px;font-family:inherit;cursor:pointer;white-space:nowrap">
          send results →
        </button>
      </div>
      <div id="email-status" style="font-size:12px;margin-top:8px;min-height:16px"></div>
    </div>

    <div class="divider"></div>

    <div class="mbti-box">
      <div class="mbti-type">${mbti}</div>
      <div>
        <div class="mbti-label">your personality type</div>
        <div class="mbti-name">${MBTI_NAMES[mbti] || ''}</div>
      </div>
    </div>

    <p style="font-size:12px;font-style:italic;color:var(--color-text-tertiary);margin-bottom:0.8rem">
      what matters to you
    </p>
    ${barChart(s)}

    <div class="divider"></div>
    <p style="font-size:13px;font-weight:400;color:var(--color-text-secondary);margin-bottom:1rem;font-style:italic">
      your top 30 career matches out of ${JOBS.length} — sorted by best fit
    </p>

    ${ranked.slice(0, 30).map((j, i) => {
      const pct = Math.round((j.score / globalBest) * 100);
      const rankLabel = i === 0 ? '#1 — best match' : `#${i + 1}`;
      return `
      <div class="result-card" style="margin-bottom:0.6rem">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px">
          <div class="job-rank">${rankLabel}</div>
          <div style="font-size:13px;font-weight:500;color:#534AB7;font-family:Georgia,serif">${pct}% match</div>
        </div>
        <div class="job-title">${j.title}</div>
        <span class="job-field ${j.fclass}">${j.field}</span>
        <div style="height:4px;background:#f0eefc;border-radius:2px;margin:6px 0 10px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:#534AB7;border-radius:2px"></div>
        </div>
        <div class="job-desc">${j.desc}</div>
        <div class="job-why">Why this fits you: ${whyJob(j, s, mbti)}</div>
      </div>`;
    }).join('')}

    <div class="divider"></div>
    <button class="btn" onclick="restart()">&#8592; start over</button>
  `;

  logResults(mbti, answers, ranked, globalBest);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────────────────────────────────────────────
//  ANALYTICS — fire-and-forget POST to Google Sheets webhook
//
//  Replace PASTE_YOUR_WEBHOOK_URL_HERE with your deployed Apps Script URL.
// ─────────────────────────────────────────────────────────────────────────────
const WEBHOOK_URL = 'PASTE_YOUR_WEBHOOK_URL_HERE';

function buildPayload(mbti, answers, ranked, globalBest, email) {
  const BAR_ORDER = ['outdoors','hands','school','risk','creative','impact','money'];
  const ENDPOINT_LABELS = {
    outdoors: ['indoors / office',      'outdoors / field'],
    hands:    ['abstract / desk work',  'physical / hands-on'],
    school:   ['skip school, start now','long academic path'],
    risk:     ['stable & proven',       'cutting-edge & high-stakes'],
    creative: ['execute proven methods','invent & create'],
    impact:   ['not a priority',        'making a difference'],
    money:    ['not a priority',        'maximize earnings'],
  };
  function normUnsigned(val, max)   { return Math.max(0, Math.min(100, Math.round((val || 0) / max * 100))); }
  function normSigned(val, range)   { return Math.max(0, Math.min(100, Math.round(((val || 0) + range) / (range * 2) * 100))); }

  const s = _lastS;
  const profile = BAR_ORDER.map(key => {
    const f = FIELDS[key];
    if (!f || !f.bar_label) return null;
    const pct = f.signed
      ? normSigned(s[key], f.bar_range || 20)
      : normUnsigned(s[key], f.bar_max || 20);
    const [leftLabel, rightLabel] = ENDPOINT_LABELS[key] || ['', ''];
    return { label: f.bar_label, pct, leftLabel, rightLabel, color: f.color };
  }).filter(Boolean);

  return {
    timestamp: Date.now(),
    email:     email || null,
    mbti,
    mbtiName:  MBTI_NAMES[mbti] || '',
    profile,
    answers: answers.map((chosen, qi) => {
      if (chosen === null) return null;
      return QUESTIONS[qi].responses[chosen].text;
    }),
    results: ranked.slice(0, 10).map(j => ({
      title:  j.title,
      field:  j.field || '',
      pct:    Math.round((j.score / globalBest) * 100),
      desc:   j.desc  || '',
      why:    whyJob(j, s, mbti),
    })),
  };
}

function logResults(mbti, answers, ranked, globalBest) {
  if (!WEBHOOK_URL || WEBHOOK_URL.includes('PASTE_YOUR')) return;
  fetch(WEBHOOK_URL, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(buildPayload(mbti, answers, ranked, globalBest, null)),
  }).catch(() => {});
}

async function sendResults() {
  const input  = document.getElementById('email-input');
  const status = document.getElementById('email-status');
  const email  = input.value.trim();

  if (!email || !email.includes('@')) {
    status.style.color = '#c0392b';
    status.textContent = 'please enter a valid email address.';
    return;
  }
  if (!WEBHOOK_URL || WEBHOOK_URL.includes('PASTE_YOUR')) {
    status.style.color = '#c0392b';
    status.textContent = 'webhook URL not configured yet.';
    return;
  }

  status.style.color = '#888';
  status.textContent = 'sending…';
  input.disabled = true;

  try {
    const payload = buildPayload(_lastMbti, answers, _lastRanked, _lastGlobalBest, email);
    payload.sendEmail = true; // tells Apps Script to send the email
    const res  = await fetch(WEBHOOK_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });
    const json = await res.json();
    if (json.status === 'ok') {
      status.style.color = '#27ae60';
      status.textContent = '✓ results sent! check your inbox.';
      document.getElementById('email-card').style.border = '1px solid #a8e6c0';
    } else {
      throw new Error(json.message || 'unknown error');
    }
  } catch (err) {
    status.style.color = '#c0392b';
    status.textContent = `something went wrong: ${err.message}`;
    input.disabled = false;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────────────────────────────────────
function showToast(msg, isError = false) {
  const existing = document.getElementById('cc-toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.id = 'cc-toast';
  t.textContent = msg;
  Object.assign(t.style, {
    position:'fixed', bottom:'28px', left:'50%',
    transform:'translateX(-50%) translateY(20px)',
    background: isError ? '#c0392b' : '#2d2b55',
    color:'#fff', padding:'12px 22px', borderRadius:'10px',
    fontSize:'14px', fontFamily:'Georgia, serif',
    boxShadow:'0 4px 20px rgba(0,0,0,0.18)',
    opacity:'0', transition:'opacity 0.25s ease, transform 0.25s ease',
    zIndex:'9999', whiteSpace:'nowrap',
  });
  document.body.appendChild(t);
  requestAnimationFrame(() => {
    t.style.opacity   = '1';
    t.style.transform = 'translateX(-50%) translateY(0)';
  });
  setTimeout(() => {
    t.style.opacity   = '0';
    t.style.transform = 'translateX(-50%) translateY(10px)';
    setTimeout(() => t.remove(), 300);
  }, 2800);
}

// ─────────────────────────────────────────────────────────────────────────────
//  IMAGE EXPORT — canvas drawing of MBTI card, bar chart, top 3 careers
// ─────────────────────────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  if (typeof r === 'number') r = {tl:r,tr:r,br:r,bl:r};
  ctx.beginPath();
  ctx.moveTo(x+(r.tl||0),y);
  ctx.lineTo(x+w-(r.tr||0),y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+(r.tr||0));
  ctx.lineTo(x+w,y+h-(r.br||0));
  ctx.quadraticCurveTo(x+w,y+h,x+w-(r.br||0),y+h);
  ctx.lineTo(x+(r.bl||0),y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-(r.bl||0));
  ctx.lineTo(x,y+(r.tl||0));
  ctx.quadraticCurveTo(x,y,x+(r.tl||0),y);
  ctx.closePath();
}

async function exportImage(mode) {
  const mbti       = _lastMbti;
  const s          = _lastS;
  const ranked     = _lastRanked;
  const globalBest = _lastGlobalBest;
  if (!mbti || !ranked) { showToast('no results to export yet', true); return; }

  const BAR_ORDER = ['outdoors','hands','school','risk','creative','impact','money'];
  const ENDPOINT_LABELS = {
    outdoors: ['indoors / office',       'outdoors / field'],
    hands:    ['abstract / desk work',   'physical / hands-on'],
    school:   ['skip school, start now', 'long academic path'],
    risk:     ['stable & proven',        'cutting-edge & high-stakes'],
    creative: ['execute proven methods', 'invent & create'],
    impact:   ['not a priority',         'making a difference'],
    money:    ['not a priority',         'maximize earnings'],
  };
  function normU(v,max)   { return Math.max(0,Math.min(1,(v||0)/max)); }
  function normS(v,range) { return Math.max(0,Math.min(1,((v||0)+range)/(range*2))); }

  // ── Helper: wrap text and return lines ──
  function wrapText(ctx, text, maxWidth) {
    const words = text.split(', ');
    const lines = [];
    let line = '';
    words.forEach(word => {
      const test = line ? line + ', ' + word : word;
      if (ctx.measureText(test).width > maxWidth && line) {
        lines.push(line);
        line = word;
      } else {
        line = test;
      }
    });
    if (line) lines.push(line);
    return lines;
  }

  const W=800, PAD=40, barH=36, barGap=10, SCALE=2;
  const numBars = BAR_ORDER.filter(k=>FIELDS[k]&&FIELDS[k].bar_label).length;
  const careerH = 108;

  // Pre-measure the "also consider" wrapped text so we know the canvas height
  const restTitles = ranked.slice(3,30).map(j=>j.title).join(', ');
  const measureCanvas = document.createElement('canvas');
  const mctx = measureCanvas.getContext('2d');
  mctx.font = '11px Georgia,serif';
  const restLines = wrapText(mctx, restTitles, W - PAD*2);
  const restBlockH = restLines.length > 0 ? 22 + restLines.length * 16 + 16 : 0;

  const H = 56          // header
           + 16         // gap
           + 100        // mbti card
           + 20         // gap
           + 14         // bar section label
           + numBars*(barH+barGap)
           + 16         // gap
           + 14         // careers section label
           + 3*careerH  // top 3 cards
           + 24         // gap before also-consider
           + restBlockH // wrapped career list
           + 36;        // footer

  const canvas = document.createElement('canvas');
  canvas.width  = W*SCALE;
  canvas.height = H*SCALE;
  const ctx = canvas.getContext('2d');
  ctx.scale(SCALE,SCALE);

  // ── Background ──
  ctx.fillStyle='#f4f3ff'; ctx.fillRect(0,0,W,H);

  // ── Header ──
  ctx.fillStyle='#534AB7'; ctx.fillRect(0,0,W,56);
  ctx.fillStyle='#fff';
  ctx.font='bold 18px Georgia,serif'; ctx.textAlign='left';
  ctx.fillText('career compass', PAD, 33);
  ctx.font='11px Georgia,serif';
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText('your personalized results', PAD, 49);

  let y = 72;

  // ── MBTI card — full-width, horizontal layout ──
  ctx.fillStyle='#fff'; roundRect(ctx,PAD,y,W-PAD*2,100,14); ctx.fill();

  // Left accent bar
  ctx.fillStyle='#534AB7'; roundRect(ctx,PAD,y,6,100,{tl:14,bl:14,tr:0,br:0}); ctx.fill();

  // MBTI letters — large, left side
  ctx.fillStyle='#534AB7';
  ctx.font='bold 42px Georgia,serif'; ctx.textAlign='left';
  ctx.fillText(mbti, PAD+24, y+66);

  // Vertical divider
  ctx.fillStyle='#e8e5fa';
  ctx.fillRect(PAD+110, y+16, 1, 68);

  // Right side: label + name stacked
  ctx.fillStyle='#aaa';
  ctx.font='10px Georgia,serif'; ctx.textAlign='left';
  ctx.fillText('PERSONALITY TYPE', PAD+124, y+38);
  ctx.fillStyle='#2d2b55';
  ctx.font='bold 20px Georgia,serif';
  ctx.fillText(MBTI_NAMES[mbti]||'', PAD+124, y+66);

  // Small "your results" tag top-right
  ctx.fillStyle='#f0eefc';
  roundRect(ctx, W-PAD-90, y+16, 78, 20, 6); ctx.fill();
  ctx.fillStyle='#7c6fe0'; ctx.font='bold 9px Georgia,serif'; ctx.textAlign='center';
  ctx.fillText('CAREER COMPASS', W-PAD-51, y+30);
  ctx.textAlign='left';

  y += 100+20;

  // ── Bar section label ──
  ctx.fillStyle='#aaa'; ctx.font='10px Georgia,serif';
  ctx.fillText('WHAT MATTERS TO YOU', PAD, y); y+=14;

  // ── Bars ──
  BAR_ORDER.forEach(key=>{
    const f=FIELDS[key]; if(!f||!f.bar_label) return;
    const pct=f.signed?normS(s[key],f.bar_range||20):normU(s[key],f.bar_max||20);
    const [lbl,rbl]=ENDPOINT_LABELS[key]||['',''];
    const tw=W-PAD*2;
    ctx.fillStyle='#555'; ctx.font='bold 10px Georgia,serif'; ctx.textAlign='left';
    ctx.fillText(f.bar_label.toUpperCase(),PAD,y+10);
    ctx.fillStyle='#e8e5fa'; roundRect(ctx,PAD,y+14,tw,10,5); ctx.fill();
    if(f.signed){ctx.fillStyle='rgba(0,0,0,0.12)'; ctx.fillRect(PAD+tw/2,y+14,1,10);}
    ctx.fillStyle=f.color||'#534AB7'; roundRect(ctx,PAD,y+14,Math.max(tw*pct,0),10,5); ctx.fill();
    ctx.fillStyle='#aaa'; ctx.font='9px Georgia,serif';
    ctx.textAlign='left';  ctx.fillText(lbl,PAD,y+36);
    ctx.textAlign='right'; ctx.fillText(rbl,W-PAD,y+36);
    ctx.textAlign='center'; ctx.fillStyle=f.color||'#534AB7'; ctx.font='bold 10px Georgia,serif';
    ctx.fillText(Math.round(pct*100)+'%',W/2,y+36); ctx.textAlign='left';
    y+=barH+barGap;
  });

  y+=8;

  // ── Top 3 careers label ──
  ctx.fillStyle='#aaa'; ctx.font='10px Georgia,serif';
  ctx.fillText('TOP 3 CAREER MATCHES', PAD, y); y+=14;

  // ── Top 3 cards ──
  ranked.slice(0,3).forEach((j,i)=>{
    const pct=Math.round((j.score/globalBest)*100);
    ctx.fillStyle='#fff'; roundRect(ctx,PAD,y,W-PAD*2,careerH-6,10); ctx.fill();

    // Rank badge
    ctx.fillStyle= i===0 ? '#534AB7' : '#e8e5fa';
    roundRect(ctx,PAD+12,y+12,i===0?90:52,18,5); ctx.fill();
    ctx.fillStyle= i===0 ? '#fff' : '#7c6fe0';
    ctx.font='bold 9px Georgia,serif'; ctx.textAlign='left';
    ctx.fillText(i===0?'#1 — best match':`#${i+1}`,PAD+18,y+25);

    ctx.fillStyle='#534AB7'; ctx.font='bold 11px Georgia,serif'; ctx.textAlign='right';
    ctx.fillText(pct+'% match',W-PAD-12,y+25); ctx.textAlign='left';

    ctx.fillStyle='#2d2b55'; ctx.font='bold 15px Georgia,serif';
    ctx.fillText(j.title,PAD+12,y+48);
    ctx.fillStyle='#7c6fe0'; ctx.font='10px Georgia,serif';
    ctx.fillText(j.field||'',PAD+12,y+62);

    const bw=W-PAD*2-24;
    ctx.fillStyle='#f0eefc'; roundRect(ctx,PAD+12,y+68,bw,5,3); ctx.fill();
    ctx.fillStyle='#534AB7'; roundRect(ctx,PAD+12,y+68,bw*(pct/100),5,3); ctx.fill();

    const desc=(j.desc||'').length>100?j.desc.slice(0,97)+'…':(j.desc||'');
    ctx.fillStyle='#777'; ctx.font='10px Georgia,serif';
    ctx.fillText(desc,PAD+12,y+90);
    y+=careerH;
  });

  y+=16;

  // ── Also consider — remaining 27 as wrapped comma list ──
  if (restLines.length > 0) {
    // Section divider line
    ctx.fillStyle='#e0dcfb'; ctx.fillRect(PAD,y,W-PAD*2,1); y+=14;

    ctx.fillStyle='#aaa'; ctx.font='10px Georgia,serif'; ctx.textAlign='left';
    ctx.fillText('ALSO CONSIDER', PAD, y); y+=16;

    ctx.fillStyle='#555'; ctx.font='11px Georgia,serif';
    restLines.forEach(line=>{
      ctx.fillText(line, PAD, y); y+=16;
    });
    y+=8;
  }

  // ── Footer ──
  ctx.fillStyle='#c0bcf0'; ctx.fillRect(PAD,y,W-PAD*2,1); y+=14;
  ctx.fillStyle='#bbb'; ctx.font='italic 10px Georgia,serif'; ctx.textAlign='center';
  ctx.fillText('use these as starting points to explore, not final answers.', W/2, y);

  // ── Export ──
  if(mode==='download'){
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/jpeg',0.92);
    a.download=`career-compass-${mbti}.jpg`;
    a.click();
    showToast('✓ image downloaded!');
  } else {
    try {
      canvas.toBlob(async blob=>{
        await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
        showToast('✓ image copied to clipboard!');
      },'image/png');
    } catch(err) {
      showToast('clipboard copy failed — try downloading instead', true);
    }
  }
}

  current = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  document.getElementById('quiz-section').style.display = 'block';
  document.getElementById('results').style.display = 'none';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

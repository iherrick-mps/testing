<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Username Generator</title>

<style>
/* TASK 3 & 5: DESIGN AND INTERACTIVE STYLING */
body {
    /* Action: Changed font and added a default background color [cite: 226, 230] */
    font-family: "Verdana", sans-serif; 
    background-color: powderblue; 
    color: darkblue; /* Action: Added custom text color [cite: 232] */
    transition: 0.5s; /* TASK 5: Smooths the mood-lighting transition [cite: 300] */
}

/* OUTER CONTAINER */
#app {
    background-color: #ffffff;
    /* Action: Added a thicker, unique border [cite: 242] */
    border: 8px double darkblue; 
    padding: 20px;
    max-width: 400px;
    margin: 40px auto; /* Centers the box on the screen */
    border-radius: 15px;
}

select, button {
    font-size: 16px;
    margin: 5px;
    padding: 5px;
}

/* TASK 5: HOVER EFFECT [cite: 297-302] */
button:hover {
    transform: scale(1.1); /* Makes button 10% larger */
    background-color: yellow; /* Changes color on hover */
    transition: 0.3s; /* Smooth growth */
    cursor: pointer; /* Changes mouse to pointing hand */
}

#output {
    margin-top: 20px;
    padding: 10px;
    border: 2px solid black;
    min-height: 30px;
    font-size: 20px;
    font-weight: bold;
    background-color: white;
}
</style>
</head>

<body>

<div id="app">
    <h2>Username Generator</h2>

    <select id="choice1"></select>
    <select id="choice2"></select>

    <br>

    <button onclick="generateUsername()">Generate</button>

    <div id="output">Your username will appear here</div>
</div>

<script>
/*************************************************
* STUDENTS EDIT HERE
*************************************************/

/* TASK 2: ADDED 'ANIMALS' TO THE MENU [cite: 183] */
const categories = ["plant", "color", "weather", "speed", "animals"];

const words = {
    /* TASK 1: EXPANDED LISTS (Added at least one word to each) [cite: 160, 162] */
    plant: ["grass", "tree", "flower", "cactus", "fern"],
    color: ["red", "green", "blue", "purple", "golden"],
    weather: ["rain", "storm", "sun", "thunder", "blizzard"],
    speed: ["fast", "slow", "sluggish", "turbo", "zippy"],
    
    /* TASK 2: ADDED NEW CATEGORY 'KITCHEN' (5 unique words) [cite: 196, 205] */
    animals: ["lion", "tiger", "bear", "wolf", "panda"]
};

/*************************************************
* DO NOT EDIT BELOW
*************************************************/

const select1 = document.getElementById("choice1");
const select2 = document.getElementById("choice2");

for (let category of categories) {
    let option1 = document.createElement("option");
    option1.value = category;
    option1.textContent = category;
    select1.appendChild(option1);

    let option2 = document.createElement("option");
    option2.value = category;
    option2.textContent = category;
    select2.appendChild(option2);
}

function generateUsername() {
    const cat1 = select1.value;
    const cat2 = select2.value;

    const list1 = words[cat1];
    const list2 = words[cat2];

    const word1 = list1[Math.floor(Math.random() * list1.length)];
    const word2 = list2[Math.floor(Math.random() * list2.length)];

    /* TASK 4: CREATE RANDOM NUMBER (0-99) [cite: 265] */
    const randomNumber = Math.floor(Math.random() * 100);

    /* TASK 4: ATTACH NUMBER TO USERNAME (CONCATENATION) [cite: 272] */
    const username =
        word1.charAt(0).toUpperCase() + word1.slice(1) +
        word2.charAt(0).toUpperCase() + word2.slice(1) + 
        randomNumber;

    document.getElementById("output").textContent = username;

    /* TASK 5: JS MOOD CHANGE (HSL RANDOM COLOR) [cite: 307] */
    document.body.style.backgroundColor = "hsl(" + Math.random() * 360 + ", 70%, 80%)";
}
</script>

</body>
</html>

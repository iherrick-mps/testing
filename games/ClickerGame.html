<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Clicker Game</title>
    <style>
        body {
            font-family: 'Consolas', 'Courier New', monospace;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            color: black;
        }
        .game-container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            margin-top: 50px;
            text-align: center;
        }
        #click-button {
            font-family: inherit;
            font-size: 24px;
            padding: 30px 60px;
            margin: 20px 0;
            cursor: pointer;
            background-color: white;
            border: 2px solid black;
            transition: 0.3s;
        }
        #click-button:hover {
            background-color: black;
            color: white;
        }
        .upgrade {
            font-family: inherit;
            font-size: 16px;
            padding: 15px;
            margin: 10px 0;
            cursor: pointer;
            background-color: white;
            border: 2px solid black;
            display: block;
            width: 100%;
            text-align: left;
        }
        .upgrade:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>CLICKER GAME</h1>
    <h2>Points: <span id="points">0</span></h2>
    <h2>Points Per Click: <span id="click-value">1</span></h2>

    <button id="click-button">CLICK ME</button>

    <hr>
    <h3>UPGRADES</h3>
    <button class="upgrade" id="double-upgrade">
        Double Click Value - Cost: <span id="double-cost">10</span>
    </button>

    <button class="upgrade" id="auto-upgrade">
        Auto-Clicker (+<span id="auto-value">1</span>/sec) - Cost: <span id="auto-cost">50</span> - Owned: <span id="auto-owned">0</span>
    </button>
</div>

<script>
    let points = 0;
    let clickValue = 1;
    let doubleCost = 10;
    let autoClickerCost = 50;
    let autoClickerOwned = 0;

    const pointsDisplay = document.getElementById('points');
    const clickValueDisplay = document.getElementById('click-value');
    const doubleCostDisplay = document.getElementById('double-cost');
    const autoCostDisplay = document.getElementById('auto-cost');
    const autoOwnedDisplay = document.getElementById('auto-owned');

    document.getElementById('click-button').addEventListener('click', () => {
        points += clickValue;
        updateDisplay();
    });

    document.getElementById('double-upgrade').addEventListener('click', () => {
        if (points >= doubleCost) {
            points -= doubleCost;
            clickValue *= 2;
            doubleCost *= 3;
            updateDisplay();
        }
    });

    document.getElementById('auto-upgrade').addEventListener('click', () => {
        if (points >= autoClickerCost) {
            points -= autoClickerCost;
            autoClickerOwned++;
            autoClickerCost = Math.floor(autoClickerCost * 1.5);
            updateDisplay();
        }
    });

    setInterval(() => {
        if (autoClickerOwned > 0) {
            points += autoClickerOwned;
            updateDisplay();
        }
    }, 1000);

    function updateDisplay() {
        pointsDisplay.textContent = points;
        clickValueDisplay.textContent = clickValue;
        doubleCostDisplay.textContent = doubleCost;
        autoCostDisplay.textContent = autoClickerCost;
        autoOwnedDisplay.textContent = autoClickerOwned;

        document.getElementById('double-upgrade').disabled = (points < doubleCost);
        document.getElementById('auto-upgrade').disabled = (points < autoClickerCost);
    }
</script>

</body>
</html>
